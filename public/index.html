<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A real-time group chat app — join instantly, no signup needed." />
  <title>NexChat — Real-Time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ========== JOIN SCREEN ========== -->
  <div id="join-screen" class="screen active">
    <div class="join-card">

      <div class="join-logo">
        <div class="logo-icon">
          <!-- Simple chat icon, white on black -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="square">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="logo-text">NexChat</span>
      </div>

      <h1 class="join-title">Join the Room</h1>
      <p class="join-subtitle">Enter your name and start chatting with everyone in real time. No account needed.</p>

      <div class="input-group">
        <label for="first-name-input">First Name</label>
        <div class="input-wrapper">
          <input type="text" id="first-name-input" placeholder="e.g. John" maxlength="20" autocomplete="given-name" />
        </div>
      </div>

      <div class="input-group">
        <label for="last-name-input">Last Name</label>
        <div class="input-wrapper">
          <input type="text" id="last-name-input" placeholder="e.g. Doe" maxlength="20" autocomplete="family-name" />
        </div>
      </div>

      <div class="input-group">
        <label for="room-id-input">Room ID (Optional)</label>
        <div class="input-wrapper">
          <input type="text" id="room-id-input" placeholder="e.g. secret-group" maxlength="20" autocomplete="off" />
        </div>
      </div>

      <button id="join-btn" class="btn-primary">
        <span>Enter Chat</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <p id="join-error" class="error-msg" aria-live="polite"></p>

    </div>
  </div>

  <!-- ========== CHAT SCREEN ========== -->
  <div id="chat-screen" class="screen">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon small">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="square">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="logo-text">NexChat</span>
      </div>

      <div class="room-info">
        <div class="room-dot"></div>
        <span class="room-label" id="sidebar-room-name">Global Room</span>
      </div>

      <div class="online-section">
        <p class="section-title">Online — <span id="online-count">1</span></p>
        <div id="online-list" class="online-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="leave-btn" class="btn-leave">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Leave Room
        </button>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <header class="chat-header">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="chat-header-info">
          <h2 class="chat-title" id="header-room-name">Global Room</h2>
          <p class="chat-subtitle" id="header-room-subtitle">Everyone can see your messages</p>
        </div>
        <div id="my-profile-pill" class="profile-pill">
          <div id="my-avatar-header" class="avatar avatar-sm"></div>
          <span id="my-name-header" class="profile-pill-name"></span>
        </div>
      </header>

      <div id="messages-container" class="messages-container">
        <div id="messages-list" class="messages-list">
          <div class="welcome-msg">
            <div class="welcome-icon">💬</div>
            <p>// Welcome to NexChat<br>Say hello to everyone.</p>
          </div>
        </div>
      </div>

      <footer class="chat-footer">
        <div class="message-bar">
          <input type="text" id="message-input" placeholder="Type a message..." maxlength="500" autocomplete="off" />
          <button id="send-btn" class="btn-send" aria-label="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </footer>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
